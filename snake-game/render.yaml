# Render Blueprint
# Docs: https://render.com/docs/blueprint-spec

databases:
  # ── Managed PostgreSQL (Render's native offering) ─────────────────────────
  - name: snake-db
    plan: free
    databaseName: snakegame
    user: snakeuser

services:
  # ── Backend (Node/Express + Prisma) ──────────────────────────────────────
  - type: web
    name: snake-backend
    plan: free
    env: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: snake-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: snake-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: snake-db
          property: port
      - key: CORS_ORIGIN
        # Set this to your frontend URL after first deploy:
        # https://snake-frontend.onrender.com
        sync: false

  # ── Frontend (React Static Site, Render CDN) ─────────────────────────────
  - type: web
    name: snake-frontend
    plan: free
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: ./client
    routes:
      - type: rewrite
        source: /*
        destination: /index.html # SPA fallback for client-side routing
    envVars:
      - key: VITE_API_URL
        # Set this to your backend URL after first deploy:
        # https://snake-backend.onrender.com
        sync: false
